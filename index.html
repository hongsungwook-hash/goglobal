<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <style>
        :root[data-theme="light"] {
            --bg: #ffffff;
            --text: #222222;
            --btn-bg: #4a90e2;
            --btn-text: #ffffff;
            --btn-hover: #357abd;
            --ball-bg: #f0f0f0;
            --toggle-bg: #cccccc;
            --toggle-knob: #ffffff;
        }
        :root[data-theme="dark"] {
            --bg: #1a1a2e;
            --text: #e0e0e0;
            --btn-bg: #4a90e2;
            --btn-text: #ffffff;
            --btn-hover: #5ba3f5;
            --ball-bg: #2e2e4e;
            --toggle-bg: #4a90e2;
            --toggle-knob: #ffffff;
        }

        * { transition: background-color 0.3s, color 0.3s; }

        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
        }

        .container {
            text-align: center;
        }

        /* 다크모드 토글 */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text);
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 26px;
            cursor: pointer;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--toggle-bg);
            border-radius: 26px;
            transition: 0.3s;
        }

        .slider::before {
            content: "";
            position: absolute;
            width: 20px;
            height: 20px;
            left: 3px;
            bottom: 3px;
            background-color: var(--toggle-knob);
            border-radius: 50%;
            transition: 0.3s;
        }

        input:checked + .slider::before {
            transform: translateX(24px);
        }

        /* 버튼 */
        #generate-btn {
            margin-top: 10px;
            padding: 10px 24px;
            font-size: 16px;
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        #generate-btn:hover {
            background-color: var(--btn-hover);
        }

        /* 번호 공 */
        #lotto-numbers {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
        }

        .number {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: var(--ball-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            font-weight: bold;
            color: var(--text);
        }
    </style>
</head>
<body>
    <div class="theme-toggle">
        <span>☀️</span>
        <label class="toggle-switch">
            <input type="checkbox" id="theme-checkbox">
            <span class="slider"></span>
        </label>
        <span>🌙</span>
    </div>

    <div class="container">
        <h1>🎱 Lotto Number Generator</h1>
        <button id="generate-btn">Generate Numbers</button>
        <div id="lotto-numbers"></div>
    </div>

    <script>
        const checkbox = document.getElementById('theme-checkbox');
        const html = document.documentElement;

        // 저장된 테마 불러오기
        const savedTheme = localStorage.getItem('theme') || 'light';
        html.setAttribute('data-theme', savedTheme);
        checkbox.checked = savedTheme === 'dark';

        checkbox.addEventListener('change', () => {
            const theme = checkbox.checked ? 'dark' : 'light';
            html.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
        });

        document.getElementById('generate-btn').addEventListener('click', () => {
            const lottoNumbersDiv = document.getElementById('lotto-numbers');
            lottoNumbersDiv.innerHTML = '';
            const numbers = new Set();
            while (numbers.size < 6) {
                numbers.add(Math.floor(Math.random() * 45) + 1);
            }
            for (const number of Array.from(numbers).sort((a, b) => a - b)) {
                const numberDiv = document.createElement('div');
                numberDiv.classList.add('number');
                numberDiv.textContent = number;
                lottoNumbersDiv.appendChild(numberDiv);
            }
        });
    </script>
</body>
</html>
