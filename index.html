<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <style>
        :root[data-theme="light"] {
            --bg: #ffffff;
            --text: #222222;
            --btn-bg: #4a90e2;
            --btn-text: #ffffff;
            --btn-hover: #357abd;
            --ball-bg: #f0f0f0;
            --toggle-bg: #cccccc;
            --toggle-knob: #ffffff;
            --card-bg: #f8f9fa;
            --card-border: #e0e0e0;
            --input-bg: #ffffff;
            --input-border: #cccccc;
        }
        :root[data-theme="dark"] {
            --bg: #1a1a2e;
            --text: #e0e0e0;
            --btn-bg: #4a90e2;
            --btn-text: #ffffff;
            --btn-hover: #5ba3f5;
            --ball-bg: #2e2e4e;
            --toggle-bg: #4a90e2;
            --toggle-knob: #ffffff;
            --card-bg: #16213e;
            --card-border: #2e2e4e;
            --input-bg: #0f3460;
            --input-border: #4a90e2;
        }

        * { transition: background-color 0.3s, color 0.3s, border-color 0.3s; box-sizing: border-box; }

        body {
            font-family: sans-serif;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 다크모드 토글 */
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text);
        }

        .toggle-switch {
            position: relative;
            width: 50px;
            height: 26px;
            cursor: pointer;
        }

        .toggle-switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: var(--toggle-bg);
            border-radius: 26px;
            transition: 0.3s;
        }

        .slider::before {
            content: "";
            position: absolute;
            width: 20px;
            height: 20px;
            left: 3px;
            bottom: 3px;
            background-color: var(--toggle-knob);
            border-radius: 50%;
            transition: 0.3s;
        }

        input:checked + .slider::before { transform: translateX(24px); }

        /* 로또 섹션 */
        .lotto-section { text-align: center; margin-bottom: 60px; }

        #generate-btn {
            margin-top: 10px;
            padding: 10px 24px;
            font-size: 16px;
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        #generate-btn:hover { background-color: var(--btn-hover); }

        #lotto-numbers {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
        }

        .number {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: var(--ball-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 22px;
            font-weight: bold;
            color: var(--text);
        }

        /* 제휴문의 폼 */
        .contact-section {
            width: 100%;
            max-width: 480px;
        }

        .contact-section h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .contact-card {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 28px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            font-size: 14px;
            background-color: var(--input-bg);
            color: var(--text);
            border: 1px solid var(--input-border);
            border-radius: 8px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: var(--btn-bg);
        }

        .form-group textarea { resize: vertical; min-height: 100px; }

        .submit-btn {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            background-color: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 4px;
        }

        .submit-btn:hover { background-color: var(--btn-hover); }

        .success-msg {
            display: none;
            text-align: center;
            padding: 16px;
            color: #27ae60;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="theme-toggle">
        <span>☀️</span>
        <label class="toggle-switch">
            <input type="checkbox" id="theme-checkbox">
            <span class="slider"></span>
        </label>
        <span>🌙</span>
    </div>

    <!-- 로또 번호 생성기 -->
    <div class="lotto-section">
        <h1>🎱 Lotto Number Generator</h1>
        <button id="generate-btn">Generate Numbers</button>
        <div id="lotto-numbers"></div>
    </div>

    <!-- 제휴문의 폼 -->
    <div class="contact-section">
        <h2>🤝 제휴문의</h2>
        <div class="contact-card">
            <form id="contact-form" action="https://formspree.io/f/xjgaerbo" method="POST">
                <div class="form-group">
                    <label for="company">회사명 / 이름</label>
                    <input type="text" id="company" name="company" placeholder="회사명 또는 이름을 입력하세요" required>
                </div>
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="email" placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label for="type">문의 유형</label>
                    <select id="type" name="type">
                        <option value="광고/마케팅">광고 / 마케팅</option>
                        <option value="콘텐츠 제휴">콘텐츠 제휴</option>
                        <option value="기술 협력">기술 협력</option>
                        <option value="기타">기타</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" placeholder="제휴 관련 내용을 자유롭게 작성해 주세요." required></textarea>
                </div>
                <button type="submit" class="submit-btn">문의 보내기</button>
            </form>
            <div class="success-msg" id="success-msg">✅ 문의가 성공적으로 전송되었습니다. 감사합니다!</div>
        </div>
    </div>

    <!-- Disqus 댓글 -->
    <div class="contact-section" style="margin-top: 60px;">
        <h2>💬 댓글</h2>
        <div id="disqus_thread"></div>
        <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
    </div>

    <script>
        // 테마 토글
        const checkbox = document.getElementById('theme-checkbox');
        const html = document.documentElement;
        const savedTheme = localStorage.getItem('theme') || 'light';
        html.setAttribute('data-theme', savedTheme);
        checkbox.checked = savedTheme === 'dark';
        checkbox.addEventListener('change', () => {
            const theme = checkbox.checked ? 'dark' : 'light';
            html.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
        });

        // 로또 번호 생성
        document.getElementById('generate-btn').addEventListener('click', () => {
            const lottoNumbersDiv = document.getElementById('lotto-numbers');
            lottoNumbersDiv.innerHTML = '';
            const numbers = new Set();
            while (numbers.size < 6) {
                numbers.add(Math.floor(Math.random() * 45) + 1);
            }
            for (const number of Array.from(numbers).sort((a, b) => a - b)) {
                const numberDiv = document.createElement('div');
                numberDiv.classList.add('number');
                numberDiv.textContent = number;
                lottoNumbersDiv.appendChild(numberDiv);
            }
        });

        // Disqus
        (function() {
            var d = document, s = d.createElement('script');
            s.src = 'https://gogolbal-1.disqus.com/embed.js';
            s.setAttribute('data-timestamp', +new Date());
            (d.head || d.body).appendChild(s);
        })();

        // 폼 제출 (AJAX)
        const form = document.getElementById('contact-form');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = form.querySelector('.submit-btn');
            btn.textContent = '전송 중...';
            btn.disabled = true;

            const res = await fetch(form.action, {
                method: 'POST',
                body: new FormData(form),
                headers: { 'Accept': 'application/json' }
            });

            if (res.ok) {
                form.style.display = 'none';
                document.getElementById('success-msg').style.display = 'block';
            } else {
                btn.textContent = '전송 실패. 다시 시도해 주세요.';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
